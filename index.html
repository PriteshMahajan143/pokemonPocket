<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A4 Image to PPT Generator</title>
<script src="https://unpkg.com/pptxgenjs/dist/pptxgen.bundle.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: linear-gradient(135deg, #ffcb05, #3b4cca);
  overflow: hidden;
}

/* Floating Pokémon style glow */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background:
    radial-gradient(circle at 30% 30%, #ff0000 0%, transparent 25%),
    radial-gradient(circle at 70% 40%, #ffcb05 0%, transparent 25%),
    radial-gradient(circle at 50% 80%, #3b4cca 0%, transparent 25%);
  opacity: 0.15;
  animation: floatBg 20s linear infinite;
  z-index: -1;
}

@keyframes floatBg {
  0% { transform: translate(0,0); }
  50% { transform: translate(-5%, -5%); }
  100% { transform: translate(0,0); }
}

.container {
  background: white;
  padding: 40px;
  border-radius: 16px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.25);
  width: 420px;
  text-align: center;
  animation: fadeIn 0.6s ease;
}

h2 { margin-bottom: 25px; }

.file-input input {
  width: 100%;
  padding: 12px;
  border: 2px dashed #3b4cca;
  border-radius: 10px;
  background: #f4f7ff;
  cursor: pointer;
  margin-bottom: 20px;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  background: linear-gradient(90deg, #ff0000, #cc0000);
  color: white;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

button:disabled {
  background: #888;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* Pokéball Loader */
.loader {
  display: none;
  margin: 30px auto 0;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: linear-gradient(to bottom, #ff0000 50%, #ffffff 50%);
  border: 4px solid #000;
  position: relative;
  animation: spin 1s linear infinite;
}

.loader::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 0;
  width: 100%;
  height: 6px;
  background: #000;
  transform: translateY(-50%);
}

.loader::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 18px;
  height: 18px;
  background: #fff;
  border: 4px solid #000;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
  <h2>Images to A4 PowerPoint</h2>

  <div class="file-input">
    <input type="file" id="imageUpload" multiple accept="image/*">
  </div>

  <button id="generateBtn" onclick="generatePPT()">Generate PowerPoint</button>

  <!-- Pokéball Loader -->
  <div id="loader" class="loader"></div>
</div>

<script>
async function generatePPT() {

  const input = document.getElementById("imageUpload");
  const files = Array.from(input.files);
  const button = document.getElementById("generateBtn");
  const loader = document.getElementById("loader");

  if (files.length === 0) {
    alert("Please upload images.");
    return;
  }

  if (files.length > 500) {
    alert("Maximum 500 images allowed.");
    return;
  }

  button.disabled = true;
  button.innerText = "Generating...";
  loader.style.display = "block";

  const pptx = new PptxGenJS();
  pptx.defineLayout({ name: 'A4', width: 8.27, height: 11.69 });
  pptx.layout = 'A4';

  const imgWidth = 2.5;        // 6.35 cm
  const imgHeight = 3.496;     // EXACT 8.88 cm

  const hGap = 0.1925;
  const vGap = 0.2975;

  const imagesPerSlide = 9;

  for (let i = 0; i < files.length; i += imagesPerSlide) {

    const slide = pptx.addSlide();
    const group = files.slice(i, i + imagesPerSlide);

    for (let j = 0; j < group.length; j++) {

      const file = group[j];
      const reader = new FileReader();

      await new Promise((resolve) => {
        reader.onload = function(e) {

          const row = Math.floor(j / 3);
          const col = j % 3;

          const x = hGap + col * (imgWidth + hGap);
          const y = vGap + row * (imgHeight + vGap);

          slide.addImage({
            data: e.target.result,
            x: x,
            y: y,
            w: imgWidth,
            h: imgHeight
          });

          resolve();
        };
        reader.readAsDataURL(file);
      });
    }
  }

  await pptx.writeFile("A4_Resized_Images.pptx");

  loader.style.display = "none";
  button.disabled = false;
  button.innerText = "Generate PowerPoint";
}
</script>

</body>
</html>
