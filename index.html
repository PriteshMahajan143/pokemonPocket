<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A4 Image to PPT Generator</title>
<script src="https://unpkg.com/pptxgenjs/dist/pptxgen.bundle.js"></script>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f4f4f4;
}

button {
  padding: 10px 20px;
  background: #0078D4;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #005ea6;
}

#progressContainer {
  width: 100%;
  background: #ddd;
  border-radius: 10px;
  margin-top: 20px;
  display: none;
}

#progressBar {
  width: 0%;
  height: 20px;
  background: #28a745;
  border-radius: 10px;
  text-align: center;
  color: white;
  font-size: 12px;
}
</style>
</head>

<body>

<h2>Upload Images (Max 500)</h2>
<input type="file" id="imageUpload" multiple accept="image/*">
<br><br>
<button onclick="generatePPT()">Generate PowerPoint</button>

<div id="progressContainer">
  <div id="progressBar">0%</div>
</div>

<script>
async function generatePPT() {

  const input = document.getElementById("imageUpload");
  const files = Array.from(input.files);

  if (files.length === 0) {
    alert("Please upload images.");
    return;
  }

  if (files.length > 500) {
    alert("Maximum 500 images allowed.");
    return;
  }

  document.getElementById("progressContainer").style.display = "block";
  updateProgress(0);

  const pptx = new PptxGenJS();

  // A4 Portrait
  pptx.defineLayout({ name: 'A4', width: 8.27, height: 11.69 });
  pptx.layout = 'A4';

  const imgWidth = 2.5;   // 6.35 cm
  const imgHeight = 3.5;  // 8.88 cm

  const hGap = 0.1925;
  const vGap = 0.2975;

  const imagesPerSlide = 9;
  let processed = 0;

  for (let i = 0; i < files.length; i += imagesPerSlide) {

    const slide = pptx.addSlide();
    const group = files.slice(i, i + imagesPerSlide);

    for (let j = 0; j < group.length; j++) {

      const file = group[j];

      const imageData = await readFile(file);

      const row = Math.floor(j / 3);
      const col = j % 3;

      const x = hGap + col * (imgWidth + hGap);
      const y = vGap + row * (imgHeight + vGap);

      // --- BLACK DOTTED OUTER BORDER ---
      slide.addShape(pptx.ShapeType.rect, {
        x: x - 0.05,
        y: y - 0.05,
        w: imgWidth + 0.1,
        h: imgHeight + 0.1,
        fill: { type: "none" },
        line: {
          color: "000000",
          width: 1,
          dashType: "sysDot"
        }
      });

      // --- RED INNER BORDER ---
      slide.addShape(pptx.ShapeType.rect, {
        x: x,
        y: y,
        w: imgWidth,
        h: imgHeight,
        fill: { type: "none" },
        line: {
          color: "FF0000",
          width: 1.5
        }
      });

      // --- IMAGE ---
      slide.addImage({
        data: imageData,
        x: x,
        y: y,
        w: imgWidth,
        h: imgHeight
      });

      processed++;
      updateProgress(Math.round((processed / files.length) * 100));
    }
  }

  await pptx.writeFile("A4_Styled_Output.pptx");
  updateProgress(100);
}

function readFile(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

function updateProgress(percent) {
  const bar = document.getElementById("progressBar");
  bar.style.width = percent + "%";
  bar.innerText = percent + "%";
}
</script>

</body>
</html>
