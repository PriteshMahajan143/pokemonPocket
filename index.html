<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A4 Image to PPT Generator</title>
<script src="https://unpkg.com/pptxgenjs/dist/pptxgen.bundle.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  transition: background 0.4s, color 0.4s;
  overflow: hidden;
}

/* Pokémon Themed Background */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background:
    radial-gradient(circle at 30% 30%, #ff0000 0%, transparent 25%),
    radial-gradient(circle at 70% 40%, #ffcb05 0%, transparent 25%),
    radial-gradient(circle at 50% 80%, #3b4cca 0%, transparent 25%);
  opacity: 0.2;
  animation: floatBg 20s linear infinite;
  z-index: -1;
}

@keyframes floatBg {
  0% { transform: translate(0,0); }
  50% { transform: translate(-5%, -5%); }
  100% { transform: translate(0,0); }
}

/* Light Mode */
body.light {
  background: linear-gradient(135deg, #ffcb05, #3b4cca);
  color: #222;
}

/* Dark Mode */
body.dark {
  background: linear-gradient(135deg, #111, #1c1c1c);
  color: #eee;
}

.container {
  background: white;
  padding: 40px;
  border-radius: 16px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  width: 420px;
  text-align: center;
  animation: fadeIn 0.6s ease;
  transition: 0.4s;
}

body.dark .container {
  background: #2a2a2a;
}

h2 {
  margin-top: 0;
  margin-bottom: 25px;
}

.file-input input {
  width: 100%;
  padding: 12px;
  border: 2px dashed #3b4cca;
  border-radius: 10px;
  background: #f4f7ff;
  cursor: pointer;
  margin-bottom: 20px;
}

body.dark .file-input input {
  background: #333;
  border-color: #ffcb05;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

.generate-btn {
  background: linear-gradient(90deg, #ff0000, #cc0000);
  color: white;
}

.toggle-btn {
  background: linear-gradient(90deg, #3b4cca, #2a75bb);
  color: white;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

button:disabled {
  background: #888;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* Progress Bar */
#progressContainer {
  width: 100%;
  background: #eee;
  border-radius: 20px;
  margin-top: 25px;
  display: none;
  overflow: hidden;
}

#progressBar {
  width: 0%;
  height: 22px;
  background: linear-gradient(90deg, #ffcb05, #ff0000);
  border-radius: 20px;
  text-align: center;
  color: black;
  font-size: 12px;
  line-height: 22px;
  transition: width 0.2s linear;
}

body.dark #progressBar {
  color: white;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body class="light">

<div class="container">
  <h2>Image to A4 PowerPoint</h2>

  <div class="file-input">
    <input type="file" id="imageUpload" multiple accept="image/*">
  </div>

  <button id="generateBtn" class="generate-btn" onclick="generatePPT()">Generate PowerPoint</button>
  <button class="toggle-btn" onclick="toggleMode()">Toggle Dark Mode</button>

  <div id="progressContainer">
    <div id="progressBar">0%</div>
  </div>
</div>

<script>
function toggleMode() {
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}

async function generatePPT() {

  const input = document.getElementById("imageUpload");
  const files = Array.from(input.files);
  const button = document.getElementById("generateBtn");

  if (files.length === 0) {
    alert("Please upload images.");
    return;
  }

  if (files.length > 500) {
    alert("Maximum 500 images allowed.");
    return;
  }

  button.disabled = true;
  button.innerText = "Generating...";

  document.getElementById("progressContainer").style.display = "block";
  updateProgress(0);

  const pptx = new PptxGenJS();
  pptx.defineLayout({ name: 'A4', width: 8.27, height: 11.69 });
  pptx.layout = 'A4';

  const imgWidth = 2.5;
  const imgHeight = 3.5;
  const hGap = 0.1925;
  const vGap = 0.2975;

  const imagesPerSlide = 9;
  let processed = 0;
  const total = files.length;

  for (let i = 0; i < total; i += imagesPerSlide) {

    const slide = pptx.addSlide();
    const group = files.slice(i, i + imagesPerSlide);

    for (let j = 0; j < group.length; j++) {

      const file = group[j];
      const reader = new FileReader();

      await new Promise((resolve) => {
        reader.onload = function(e) {

          const row = Math.floor(j / 3);
          const col = j % 3;

          const x = hGap + col * (imgWidth + hGap);
          const y = vGap + row * (imgHeight + vGap);

          slide.addImage({
            data: e.target.result,
            x: x,
            y: y,
            w: imgWidth,
            h: imgHeight
          });

          resolve();
        };
        reader.readAsDataURL(file);
      });

      processed++;

      // Accurate progress calculation
      let percent = Math.floor((processed / total) * 100);

      // Prevent visual stall at 99%
      if (percent > 99) percent = 99;

      updateProgress(percent);
    }
  }

  await pptx.writeFile("A4_Resized_Images.pptx");

  updateProgress(100);
  button.disabled = false;
  button.innerText = "Generate PowerPoint";
}

function updateProgress(percent) {
  const bar = document.getElementById("progressBar");
  bar.style.width = percent + "%";
  bar.innerText = percent + "%";
}
</script>

</body>
</html>
