<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A4 Image to PPT Generator</title>
<script src="https://unpkg.com/pptxgenjs/dist/pptxgen.bundle.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #ffcb05, #3b4cca);
  min-height: 100vh;
}

/* Navigation */
.navbar {
  background: #111;
  padding: 12px;
  text-align: center;
}

.navbar button {
  width: auto;
  margin: 0 10px;
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: 600;
}

/* Page Layout */
.page {
  display: none;
  padding: 40px;
  text-align: center;
}

.active {
  display: block;
}

.container {
  background: white;
  padding: 40px;
  border-radius: 16px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.25);
  width: 420px;
  margin: auto;
}

.file-input input {
  width: 100%;
  padding: 12px;
  border: 2px dashed #3b4cca;
  border-radius: 10px;
  background: #f4f7ff;
  cursor: pointer;
  margin-bottom: 20px;
}

button {
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  background: linear-gradient(90deg, #ff0000, #cc0000);
  color: white;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
}

/* Pokéball Loader */
.loader {
  display: none;
  margin: 30px auto 0;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: linear-gradient(to bottom, #ff0000 50%, #ffffff 50%);
  border: 4px solid #000;
  position: relative;
  animation: spin 1s linear infinite;
}

.loader::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 0;
  width: 100%;
  height: 6px;
  background: #000;
  transform: translateY(-50%);
}

.loader::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 18px;
  height: 18px;
  background: #fff;
  border: 4px solid #000;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* Card Gallery */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.card-img {
  width: 100%;
  border-radius: 12px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.card-img:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="navbar">
  <button onclick="showPage('homePage')">Home</button>
  <button onclick="showPage('galleryPage')">My Cards</button>
</div>

<!-- HOME PAGE -->
<div id="homePage" class="page active">
  <div class="container">
    <h2>Images to A4 PowerPoint</h2>

    <div class="file-input">
      <input type="file" id="imageUpload" multiple accept="image/*">
    </div>

    <button onclick="saveCards()">Save Cards</button>
    <br><br>
    <button id="generateBtn" onclick="generatePPT()">Generate PowerPoint</button>

    <div id="loader" class="loader"></div>
  </div>
</div>

<!-- GALLERY PAGE -->
<div id="galleryPage" class="page">
  <h2>My Stored Cards</h2>
  <div id="cardGallery" class="gallery"></div>
</div>

<script>

/* Page Switch */
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  if (pageId === "galleryPage") loadGallery();
}

/* Save Cards to Browser */
function saveCards() {
  const files = Array.from(document.getElementById("imageUpload").files);
  if (files.length === 0) {
    alert("Upload images first.");
    return;
  }

  let storedCards = JSON.parse(localStorage.getItem("cards") || "[]");

  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = function(e) {
      storedCards.push(e.target.result);
      localStorage.setItem("cards", JSON.stringify(storedCards));
    };
    reader.readAsDataURL(file);
  });

  alert("Cards saved successfully!");
}

/* Load Gallery */
async function loadGallery() {

  const username = "PriteshMahajan143";
  const repo = "pokemonPocket";
  const branch = "main";

  const gallery = document.getElementById("cardGallery");
  gallery.innerHTML = "Loading cards...";

  try {
    const response = await fetch(
      `https://api.github.com/repos/${username}/${repo}/contents/cards?ref=${branch}`
    );

    const folders = await response.json();
    gallery.innerHTML = "";

    for (const folder of folders) {

      if (folder.type === "dir") {

        // Create Folder Section
        const section = document.createElement("div");
        section.style.marginBottom = "50px";

        const title = document.createElement("h3");
        title.innerText = folder.name;
        title.style.marginBottom = "15px";
        section.appendChild(title);

        const grid = document.createElement("div");
        grid.style.display = "grid";
        grid.style.gridTemplateColumns = "repeat(auto-fill, minmax(150px, 1fr))";
        grid.style.gap = "20px";

        // Fetch images inside folder
        const imageResponse = await fetch(folder.url);
        const images = await imageResponse.json();

        images.forEach(img => {
          if (img.type === "file" && img.name.match(/\.(jpg|jpeg|png|webp)$/i)) {

            const imageElement = document.createElement("img");
            imageElement.src = img.download_url;
            imageElement.style.width = "100%";
            imageElement.style.borderRadius = "12px";
            imageElement.style.boxShadow = "0 10px 20px rgba(0,0,0,0.2)";
            imageElement.style.transition = "0.3s";
            imageElement.onmouseover = () => imageElement.style.transform = "scale(1.05)";
            imageElement.onmouseout = () => imageElement.style.transform = "scale(1)";

            grid.appendChild(imageElement);
          }
        });

        section.appendChild(grid);
        gallery.appendChild(section);
      }
    }

  } catch (error) {
    gallery.innerHTML = "Failed to load cards.";
    console.error(error);
  }
}

/* Generate PPT */
async function generatePPT() {

  const input = document.getElementById("imageUpload");
  const files = Array.from(input.files);
  const button = document.getElementById("generateBtn");
  const loader = document.getElementById("loader");

  if (files.length === 0) {
    alert("Please upload images.");
    return;
  }

  button.disabled = true;
  loader.style.display = "block";

  const pptx = new PptxGenJS();
  pptx.defineLayout({ name: 'A4', width: 8.27, height: 11.69 });
  pptx.layout = 'A4';

  const imgWidth = 2.5;
  const imgHeight = 3.496;
  const hGap = 0.1925;
  const vGap = 0.2975;

  const imagesPerSlide = 9;

  for (let i = 0; i < files.length; i += imagesPerSlide) {

    const slide = pptx.addSlide();
    const group = files.slice(i, i + imagesPerSlide);

    for (let j = 0; j < group.length; j++) {

      const file = group[j];
      const reader = new FileReader();

      await new Promise((resolve) => {
        reader.onload = function(e) {

          const row = Math.floor(j / 3);
          const col = j % 3;

          const x = hGap + col * (imgWidth + hGap);
          const y = vGap + row * (imgHeight + vGap);

          slide.addImage({
            data: e.target.result,
            x: x,
            y: y,
            w: imgWidth,
            h: imgHeight
          });

          resolve();
        };
        reader.readAsDataURL(file);
      });
    }
  }

  await pptx.writeFile("A4_Resized_Images.pptx");

  loader.style.display = "none";
  button.disabled = false;
}
</script>

</body>
</html>
