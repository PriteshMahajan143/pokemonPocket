<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Bulk Image to PowerPoint Generator</title>
  <script src="https://unpkg.com/pptxgenjs/dist/pptxgen.bundle.js"></script>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f4f4;
    }
    h2 {
      color: #333;
    }
    input {
      margin: 10px 0;
    }
    button {
      padding: 10px 20px;
      background: #0078D4;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    button:hover {
      background: #005ea6;
    }
    .info {
      margin-top: 10px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>

<h2>Upload Images (Max 500)</h2>

<input type="file" id="imageUpload" multiple accept="image/*">
<br>
<button onclick="generatePPT()">Generate PowerPoint</button>

<div class="info">
  • Maximum 500 images<br>
  • 9 images per slide (Front Card 1 → 9)<br>
  • Images auto resized<br>
</div>

<script>

async function generatePPT() {

  const input = document.getElementById("imageUpload");
  const files = Array.from(input.files);

  if (files.length === 0) {
    alert("Please upload images.");
    return;
  }

  if (files.length > 500) {
    alert("Maximum 500 images allowed.");
    return;
  }

  const pptx = new PptxGenJS();
  pptx.layout = "LAYOUT_16x9";

  const imagesPerSlide = 9;
  const imgWidth = 3;   // inches
  const imgHeight = 2;  // inches

  for (let i = 0; i < files.length; i += imagesPerSlide) {

    const slide = pptx.addSlide();

    const group = files.slice(i, i + imagesPerSlide);

    for (let j = 0; j < group.length; j++) {

      const file = group[j];
      const reader = new FileReader();

      await new Promise((resolve) => {
        reader.onload = function(e) {

          const row = Math.floor(j / 3);
          const col = j % 3;

          const x = 0.5 + col * (imgWidth + 0.3);
          const y = 0.5 + row * (imgHeight + 0.8);

          slide.addImage({
            data: e.target.result,
            x: x,
            y: y,
            w: imgWidth,
            h: imgHeight
          });

          slide.addText(`Front Card ${j + 1}`, {
            x: x,
            y: y + imgHeight + 0.1,
            w: imgWidth,
            h: 0.3,
            fontSize: 12,
            align: "center"
          });

          resolve();
        };
        reader.readAsDataURL(file);
      });

    }
  }

  pptx.writeFile("Generated_Cards.pptx");
}

</script>

</body>
</html>
