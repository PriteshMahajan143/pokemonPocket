<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A4 Image to PPT Generator</title>
<script src="https://unpkg.com/pptxgenjs/dist/pptxgen.bundle.js"></script>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f4f4f4;
}
button {
  padding: 10px 20px;
  background: #0078D4;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
button:hover {
  background: #005ea6;
}

/* Progress Bar */
#progressContainer {
  width: 100%;
  background: #ddd;
  border-radius: 10px;
  margin-top: 20px;
  display: none;
}
#progressBar {
  width: 0%;
  height: 20px;
  background: #28a745;
  border-radius: 10px;
  text-align: center;
  color: white;
  font-size: 12px;
}
</style>
</head>

<body>

<h2>Upload Images</h2>
<input type="file" id="imageUpload" multiple accept="image/*">
<br><br>
<button onclick="generatePPT()">Generate PowerPoint</button>

<!-- Progress Bar -->
<div id="progressContainer">
  <div id="progressBar">0%</div>
</div>

<script>
async function generatePPT() {

  const input = document.getElementById("imageUpload");
  const files = Array.from(input.files);

  if (files.length === 0) {
    alert("Please upload images.");
    return;
  }

  if (files.length > 500) {
    alert("Maximum 500 images allowed.");
    return;
  }

  document.getElementById("progressContainer").style.display = "block";
  updateProgress(0);

  const pptx = new PptxGenJS();

  // A4 Portrait
  pptx.defineLayout({ name: 'A4', width: 8.27, height: 11.69 });
  pptx.layout = 'A4';

  const imgWidth = 2.5;
  const imgHeight = 3.5;

  const hGap = 0.1925;
  const vGap = 0.2975;

  const imagesPerSlide = 9;
  let processed = 0;

  for (let i = 0; i < files.length; i += imagesPerSlide) {

    const slide = pptx.addSlide();
    const group = files.slice(i, i + imagesPerSlide);

    for (let j = 0; j < group.length; j++) {

      const file = group[j];
      const reader = new FileReader();

      await new Promise((resolve) => {
        reader.onload = function(e) {

          const row = Math.floor(j / 3);
          const col = j % 3;

          const x = hGap + col * (imgWidth + hGap);
          const y = vGap + row * (imgHeight + vGap);

          slide.addImage({
            data: e.target.result,
            x: x,
            y: y,
            w: imgWidth,
            h: imgHeight
          });

          resolve();
        };
        reader.readAsDataURL(file);
      });

      processed++;
      updateProgress(Math.round((processed / files.length) * 100));
    }
  }

  await pptx.writeFile("A4_Resized_Images.pptx");
  updateProgress(100);
}

function updateProgress(percent) {
  const bar = document.getElementById("progressBar");
  bar.style.width = percent + "%";
  bar.innerText = percent + "%";
}
</script>

</body>
</html>
